name: rush_logistic_box_pose_only

# ← 변환 완료 후 실제 HDF5 경로로 교체
dataset_path: /home/rush/Desktop/Datasets/20260630_195919_diffusion.hdf5

image_shape: [3, 240, 320]

shape_meta: &shape_meta
  obs:
    image0:
      shape: [3, 240, 320]
      type: rgb
    robot_pose_L:
      shape: [3]
      type: low_dim
    robot_quat_L:
      shape: [4]
      type: low_dim
      rotation_rep: rotation_6d
  action:
    shape: [9]   # pos(3) + rot6d(6)
    rotation_rep: rotation_6d

pose_repr: &pose_repr
  obs_pose_repr: abs
  action_pose_repr: abs   # absolute command pose 사용

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: diffusion_policy.dataset.bae_robomimic_replay_image_dataset.BaeRobomimicReplayDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  use_cache: True
  seed: 42
  val_ratio: 0.02
  pose_repr: *pose_repr
