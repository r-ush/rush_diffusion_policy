defaults:
  - _self_
  - task: real_pusht_image

name: train_diffusion_transformer_hybrid
_target_: diffusion_policy.workspace.train_diffusion_transformer_hybrid_workspace.TrainDiffusionTransformerHybridWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

horizon: 16
n_obs_steps: 2
n_action_steps: 6
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_cond: True

policy:
  _target_: diffusion_policy.policy.diffusion_transformer_hybrid_image_raw_wrench_policy.DiffusionTransformerHybridImagePolicy

  shape_meta: ${shape_meta}
  
  noise_scheduler:
    # _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    _target_: scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    # beta_schedule is important
    # this is the best we found
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon # or sample or v_prediction

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 16

  #crop_shape: [216, 288] # ch, cw 320x240 90%
  #crop_shape: [210, 210]
  #obs_encoder_group_norm: True
  #eval_fixed_crop: True

  n_layer: 7
  n_cond_layers: 0  # >0: use transformer encoder for cond, otherwise use MLP
  n_head: 4
  n_emb: 512
  p_drop_emb: 0.0
  p_drop_attn: 0.1
  causal_attn: True
  time_as_cond: True # if false, use BERT like encoder only arch, time as input
  obs_as_cond: ${obs_as_cond}

  # scheduler.step params
  # predict_epsilon: True
  pose_repr: ${task.pose_repr}
  
  obs_encoder:
    fuse_mode: modality-attention # modality-attention or concat
    position_encoding: learnable
    
    
    vision_encoder_cfg:
      model_name: 'resnet34.a1_in1k'
      #model_name: 'vit_base_patch32_clip_224.openai'
      pretrained: False
      frozen: False
      use_group_norm: True # if resnet from scratch
      global_pool: ''
      feature_aggregation: 'attention_pool_2d'
    
      # use for resnet. 32 (7x7) feature_dim=512 // 16 (14x14) feature_dim=256
      downsample_ratio: 32
      
      
    
      transforms:
        randomcrop:
          ratio: 0.95
        
        colorjitter:
          brightness: 0.3
          contrast: 0.4
          saturation: 0.5
          hue: 0.08
          grayscale: 0.005
      
    
    force_encoder_cfg:
      model_name: causalconv # causalconv or gru
      feature_dim: 512 # vision_feature_dim 이랑 맞춰줘야 modality-attention 가능

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 24
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 24
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  # transformer & other models
  lr: 3.0e-4
  weight_decay: 1.0e-6
  # pretrained image model
  obs_encoder_lr: 3.0e-4
  obs_encoder_weight_decay: 1.0e-6
  
  betas: [0.9, 0.999] 

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  # optimization
  lr_scheduler: cosine
  # Transformer needs LR warmup
  lr_warmup_steps: 500
  num_epochs: 2000
  gradient_accumulate_every: 1
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  # training loop control
  # in epochs
  rollout_every: 100
  checkpoint_every: 100
  val_every: 1
  sample_every: 5
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  resume_path: null
  drive_sync_enabled: True
  drive_sync_every: 10
  drive_sync_dir: /content/drive/MyDrive/diffusion_checkpoints/
  topk:
    monitor_key: train_loss
    mode: min
    k: 20
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: /data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: /data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: /data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
