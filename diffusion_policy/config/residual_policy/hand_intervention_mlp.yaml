# @package _global_
# Top-level residual config for ONLINE hand DAgger — INTERVENTION (physical-push) 판.
# hand_online_mlp.yaml(teleop 판)과 동일한 정책(frozen hand-16D slow base 위 pose-only 6D
# residual head)을 쓰되, hand_intervention task(dataset 에 intervention_key)를 바인딩한다.
# intervention learner(online_learning/residual_intervention_learner.py)가 이 config 를
# compose 한 뒤 자체 warm-continue 루프 + 개입 프레임 가중 샘플러로 head 만 학습한다.
defaults:
  - /residual_policy/task: hand_intervention
  - _self_

name: hand_intervention_mlp
_target_: diffusion_policy.residual_policy.workspace.TrainFastResidualWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: ${task.name}

horizon: 1
n_obs_steps: 16
n_action_steps: 1
dataset_obs_steps: ${n_obs_steps}

slow_ckpt_path: ${task.slow_ckpt_path}

policy:
  _target_: diffusion_policy.residual_policy.mlp_policy.FastResidualMLPPolicy
  shape_meta: ${shape_meta}
  slow_ckpt_path: ${slow_ckpt_path}
  slow_use_ema: True
  base_action_key: ${task.dataset.base_action_key}
  n_obs_steps: ${n_obs_steps}
  hidden_dims: [512, 512, 256]
  dropout: 0.0
  freeze_vision_encoder: True
  freeze_force_encoder: ${task.fast_force_encoder.freeze_force_encoder}
  train_force_encoder: ${task.fast_force_encoder.train_force_encoder}
  include_initial_low_dim: False
  include_initial_wrench: False
  include_step_low_dim: True
  step_encoding: sin_cos
  force_encoder_cfg: ${task.fast_force_encoder.force_encoder_cfg}

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 64
  num_workers: 2
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 100
  num_epochs: 200
  gradient_accumulate_every: 1
  use_ema: True
  checkpoint_every: 50
  val_every: 10
  sample_every: 10
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: residual_online_dagger
  resume: False
  mode: disabled
  name: ${name}_${task_name}
  tags: ["${name}", "${task_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 1
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.5f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/residual_policy/online/${task.name}_${name}
  wandb_name_base: ${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/residual_policy/online/${task.name}_${name}
  sweep:
    dir: data/outputs/residual_policy/online/${task.name}_${name}
    subdir: ${hydra.job.num}
