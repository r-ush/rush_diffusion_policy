# @package _global_
defaults:
  - /residual_policy/task: no_force
  - _self_

name: gru
_target_: diffusion_policy.residual_policy.workspace.TrainFastResidualWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: ${task.name}

horizon: 1
n_obs_steps: 16
n_action_steps: 1
dataset_obs_steps: ${n_obs_steps}

slow_ckpt_path: ${task.slow_ckpt_path}

task:
  dataset:
    _target_: diffusion_policy.residual_policy.step_dataset.FastResidualContextStepDataset

policy:
  _target_: diffusion_policy.residual_policy.temporal_step_policy.FastResidualTemporalPolicy
  shape_meta: ${shape_meta}
  slow_ckpt_path: ${slow_ckpt_path}
  slow_use_ema: True
  base_action_key: ${task.dataset.base_action_key}
  n_obs_steps: ${n_obs_steps}
  rnn_hidden_dim: 256
  rnn_num_layers: 1
  hidden_dims: [512, 256]
  dropout: 0.0
  freeze_vision_encoder: True
  freeze_force_encoder: ${task.fast_force_encoder.freeze_force_encoder}
  train_force_encoder: ${task.fast_force_encoder.train_force_encoder}
  include_initial_wrench: False
  force_encoder_cfg: ${task.fast_force_encoder.force_encoder_cfg}

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 16
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 16
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 500
  gradient_accumulate_every: 1
  use_ema: True
  checkpoint_every: 50
  val_every: 20
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 10
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.5f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/residual_policy/fast/${task.name}_${name}/${now:%Y%m%d_%H%M%S}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/residual_policy/fast/${task.name}_${name}/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: data/outputs/residual_policy/fast/${task.name}_${name}/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra.job.num}
