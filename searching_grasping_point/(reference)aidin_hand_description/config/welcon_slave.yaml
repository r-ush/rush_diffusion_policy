vendor_id: "0x00000ba9"
product_id: "0x30000001"
assign_activate: 0x0300
auto_fault_reset: false
sdo:
  # Modes of Operation
  - { index: 0x6060, sub_index: 0x00, type: int8, value: 8 }
  - { index: 0x6068, sub_index: 0x00, type: int8, value: 8 }
  - { index: 0x7060, sub_index: 0x00, type: int8, value: 8 }

  # Homming Mode
  - { index: 0x6098, sub_index: 0x00, type: int8, value: 35 }
  - { index: 0x6898, sub_index: 0x00, type: int8, value: 35 }
  - { index: 0x7098, sub_index: 0x00, type: int8, value: 35 }

rpdo:
