      - {
          index: 0x6840,
          sub_index: 0x00,
          type: uint16,
          default_value: 0x06,
          command_interface: axis2/control_word,
        } # Controlword
      - {
          index: 0x6860,
          sub_index: 0x00,
          type: int8,
          command_interface: axis2/mode_of_operation,
        } # Modes of Operation
      - { index: 0x6860, sub_index: 0x00, type: int8 } # Modes of Operation
  - index: "0x1620"
    channels:
      - {
          index: 0x707a,
          sub_index: 0x00,
          type: int32,
          command_interface: axis3/position,
        } # Target Position
      - {
          index: 0x7071,
          sub_index: 0x00,
          type: int16,
          command_interface: axis3/effort,
        } # Target Torque
      - {
          index: 0x7072,
          sub_index: 0x00,
          type: int16,
          command_interface: axis3/maximum_effort,
          default_value: 1000,
        } # Maximum Torque
      - {
          index: 0x7040,
          sub_index: 0x00,
