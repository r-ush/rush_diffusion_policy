        } # Controlword
      - {
          index: 0x7060,
          sub_index: 0x00,
          type: int8,
          command_interface: axis3/mode_of_operation,
        } # Modes of Operation
      - { index: 0x7060, sub_index: 0x00, type: int8 } # Modes of Operation

tpdo:
