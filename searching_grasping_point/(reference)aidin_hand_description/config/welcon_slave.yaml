          index: 0x607a,
          sub_index: 0x00,
          type: int32,
          command_interface: axis1/position,
        } # Target Position
      - {
          index: 0x6071,
          sub_index: 0x00,
          type: int16,
          command_interface: axis1/effort,
        } # Target Torque
      - {
          index: 0x6072,
          sub_index: 0x00,
          type: int16,
          command_interface: axis1/maximum_effort,
          default_value: 1000,
        } # Maximum Torque
      - {
          index: 0x6040,
          sub_index: 0x00,
          type: uint16,
          default_value: 0x06,
          command_interface: axis1/control_word,
        } # Controlword
      - {
          index: 0x6060,
          sub_index: 0x00,
          type: int8,
          command_interface: axis1/mode_of_operation,
        } # Modes of Operation
      - { index: 0x6060, sub_index: 0x00, type: int8 } # Modes of Operation
  - index: "0x1610"
    channels:
      - {
          index: 0x687a,
          sub_index: 0x00,
          type: int32,
          command_interface: axis2/position,
        } # Target Position
      - {
          index: 0x6871,
          sub_index: 0x00,
          type: int16,
          command_interface: axis2/effort,
        } # Target Torque
      - {
          index: 0x6872,
          sub_index: 0x00,
