      - {
          index: 0x6064,
          sub_index: 0x00,
          type: int32,
          state_interface: axis1/position,
        } # Position Actual Value
      - {
          index: 0x606c,
          sub_index: 0x00,
          type: int32,
          state_interface: axis1/velocity,
        } # Velocity Actual Value
      - {
          index: 0x6078,
          sub_index: 0x00,
          type: int16,
          state_interface: axis1/effort,
